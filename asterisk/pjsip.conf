[global]
type=global
; A seção global agora fica limpa.

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0
local_net=${SERVER}
external_media_address=${SERVER_HOST}
external_signaling_address=${SERVER_HOST}

[webrtc_client](!)
type=endpoint
context=default
allow=opus
disallow=all
allow=ulaw
allow=vp8
webrtc=yes
use_avpf=yes
bundle=yes
media_encryption=dtls
dtls_auto_generate_cert=yes
dtls_verify=fingerprint
ice_support=yes
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
direct_media=no
rtcp_mux=yes
max_audio_streams=1
max_video_streams=1

; =========================================================
; RAMAIS
; =========================================================
[1001](webrtc_client)
auth=1001-auth
aors=1001

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=1234

[1001]
type=aor
max_contacts=5
remove_existing=yes

