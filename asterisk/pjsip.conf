
[transport-udp]
type=transport
protocol=udp    ;udp,tcp,tls,ws,wss,flow
bind=0.0.0.0:5060
local_net=10.190.0.0/16; Ajuste para a sua rede (ex: 192.168.1.0/24)
external_media_address=10.190.109.98 ; O IP DO SEU PC (mesmo do hostname -I)
external_signaling_address=10.190.109.98

; Criamos o modelo (o '!' indica que é apenas um template)
[ramal-padrao](!)
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
direct_media=no

; Template para AOR (identificação do dispositivo)
[aor-padrao](!)
type=aor
max_contacts=1

; Template para AUTH (autenticação)
[auth-padrao](!)
type=auth
auth_type=userpass

; --- ADICIONE OS RAMAIS ORIGINAIS AQUI ---

